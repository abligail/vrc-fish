[common]
# 是否启用Tab暂停功能（1=开启，0=关闭）
# Enable Tab-to-pause function (1=On, 0=Off)
is_pause=1

[vrchat_fish]
# 目标窗口类名（用于定位VRChat窗口）
# Target window class name (used to locate the VRChat window)
window_class=UnityWndClass
# 目标窗口标题需包含的关键字（用于辅助定位窗口）
# Target window title keywords (used to assist in window localization)
window_title_contains=VRChat

# 是否强制调整窗口客户区分辨率（1=强制，0=不强制）
# Force adjustment of window client area resolution (1=Force, 0=Do not force)
force_resolution=1
# 强制分辨率宽度（像素）
# Forced resolution width (pixels)
target_width=1280
# 强制分辨率高度（像素）
# Forced resolution height (pixels)
target_height=960

# 普通截图轮询间隔（毫秒，越小检测越频繁）
# Standard screenshot polling interval (ms; lower values increase detection frequency)
capture_interval_ms=20
# 抛竿点击后等待进入咬钩阶段的延迟（毫秒）
# Delay after casting click before entering the bite phase (ms)
cast_delay_ms=200
# 抛竿后鼠标轻微移动（相对位移；正值=向右/向下，0=禁用）
# Slight mouse movement after casting (Relative displacement; positive = right/down, 0 = disabled)
cast_mouse_move_dx=20
cast_mouse_move_dy=0
# 随机偏移范围，dx/dy 将在 [base-range, base+range] 内随机
# Random offset range; dx/dy will be randomized within [base-range, base+range]
cast_mouse_move_random_range = 5
# 移动前随机延迟的最大毫秒数，0 表示不延迟
# Maximum random delay before movement (ms); 0 indicates no delay
cast_mouse_move_delay_max    = 1000
# 平滑移动持续时间（毫秒），0=瞬间移动
# Smooth movement duration (ms); 0 = instantaneous movement
cast_mouse_move_duration_ms = 500
# 每一步移动的间隔（毫秒）
# Interval between each movement step (ms)
cast_mouse_move_step_ms = 30

# 等待咬钩的最长时间，超时会重开一轮（毫秒）
# Maximum wait time for a bite; timeout restarts the round (ms)
bite_timeout_ms=30000
# 点击咬钩提示后，等待小游戏UI出现的固定延迟（毫秒）
# Fixed delay after clicking the bite prompt before the minigame UI appears (ms)
minigame_enter_delay_ms=0
# 兼容旧配置：未设置cleanup_wait_after_ms时，使用该值（毫秒）
# Legacy compatibility: Used if cleanup_wait_after_ms is unset (ms)
loot_click_delay_ms=2000

# 清理流程开始前等待时间（毫秒）
# Wait time before starting the cleanup process (ms)
cleanup_wait_before_ms=1500
# 清理流程中连续左键点击次数
# Number of consecutive left-clicks during the cleanup process
cleanup_click_count=1
# 清理流程中相邻两次点击间隔（毫秒）
# Interval between two consecutive clicks during cleanup (ms)
cleanup_click_interval_ms=150
# 清理流程中用于强制收杆的按键（单字符，建议大写字母）
# Key used for forced reeling during cleanup (Single character, uppercase recommended)
cleanup_reel_key=T
# 清理流程结束后到下一轮开始前的等待时间（毫秒）
# Wait time after cleanup before the next round starts (ms)
cleanup_wait_after_ms=4000

# 咬钩判定需要连续命中的帧数
# Number of consecutive frames required to confirm a bite
bite_confirm_frames=1
# 小游戏结束判定需要连续丢失目标的帧数
# Number of consecutive frames losing the target required to confirm game end
game_end_confirm_frames=5

# 咬钩感叹号模板匹配阈值（0~1，越高越严格）
# Bite exclamation mark template matching threshold (0-1; higher is stricter)
bite_threshold=0.75
# 小游戏轨道模板匹配阈值（0~1），原始0.75
# Minigame track template matching threshold (0-1); original value was 0.75
minigame_threshold=0.7
# 鱼图标模板匹配阈值（0~1）
# Fish icon template matching threshold (0-1)
fish_icon_threshold=0.44
# 玩家滑块模板匹配阈值（0~1）
# Player slider template matching threshold (0-1)
slider_threshold=0.88

# 小游戏控制循环间隔（毫秒）
# Minigame control loop interval (ms)
control_interval_ms=20

# 滑块颜色检测亮度阈值（0~255）
# Slider color detection brightness threshold (0-255)
slider_bright_thresh=200
# 滑块最小有效高度（像素）
# Minimum valid height for the slider (pixels)
slider_min_height=15
# 颜色检测时在滑块中心两侧取样半宽（像素）
# Sampling half-width on both sides of the slider center during color detection (pixels)
slider_detect_half_width=4
# 合并相邻亮段的最大间隙（像素）
# Maximum gap for merging adjacent bright segments (pixels)
slider_detect_merge_gap=40

# 松开鼠标时的重力加速度（像素/步^2，正值向下）
# Gravity acceleration when mouse is released (pixels/step^2; positive is downward)
bb_gravity=1.4
# 按住鼠标时的推力加速度（像素/步^2，负值向上）
# Thrust acceleration when mouse is held (pixels/step^2; negative is upward)
bb_thrust=-2.8
# 速度阻尼系数（0.5~1.0，越小阻尼越大）
# Velocity drag coefficient (0.5-1.0; lower values increase drag)
bb_drag=1
# MPC前瞻步数（每步约等于一个控制周期）
# MPC look-ahead steps (each step roughly equals one control cycle)
bb_sim_horizon=8
# 安全边距比例（相对滑块高度，0~0.45）
# Safety margin ratio (relative to slider height, 0-0.45)
bb_margin_ratio=0.25
# MPC日志打印间隔（毫秒，0=每帧打印）
# MPC log print interval (ms; 0 = print every frame)
bb_log_interval_ms=200
# 边界惩罚生效区域宽度（像素）
# Boundary penalty effective zone width (pixels)
bb_boundary_zone=80
# 边界惩罚权重（越大越倾向提前减速）
# Boundary penalty weight (higher values favor earlier deceleration)
bb_boundary_weight=0.5
# 速度EMA平滑系数（0~1，越大跟踪越快）
# Velocity EMA smoothing coefficient (0-1; higher values track faster)
velocity_ema_alpha=0.9

# 多尺度鱼模板1缩放比例（已不再用于鱼图标匹配：鱼图标直接使用轨道锁定得到的 scale/angle）
# Multi-scale fish template 1 scale (Deprecated for fish icons; icons use track lock scale/angle)
fish_scale_1=0.9
# 多尺度鱼模板2缩放比例（同上）
# Multi-scale fish template 2 scale (As above)
fish_scale_2=1.0
# 多尺度鱼模板3缩放比例（同上）
# Multi-scale fish template 3 scale (As above)
fish_scale_3=1.2
# 多尺度鱼模板4缩放比例（同上）
# Multi-scale fish template 4 scale (As above)
fish_scale_4=1.5
# 多尺度轨道模板1缩放比例（minigame_bar_full.png）
# Multi-scale track template 1 scale (minigame_bar_full.png)
track_scale_1=0.9
# 多尺度轨道模板2缩放比例
# Multi-scale track template 2 scale
track_scale_2=1.0
# 多尺度轨道模板3缩放比例
# Multi-scale track template 3 scale
track_scale_3=1.2
# 多尺度轨道模板4缩放比例
# Multi-scale track template 4 scale
track_scale_4=1.5
# 轨道模板自动多尺度：启用缩放范围（优先级高于 track_scale_1~4，建议用于适配不同分辨率/UI缩放）
# Automatic multi-scaling for track templates: scale range (Prioritized over track_scale_1-4; recommended for resolution/UI scaling)
# 关闭：将 track_scale_step 设为 0
# Disabled: Set track_scale_step to 0
track_scale_min=0.8
track_scale_max=2
track_scale_step=0.2
# 在粗尺度 topK 个结果附近再细分一次（建议 topK=2）
# Refine scale once near the top-K coarse scale results (recommended topK=2)
track_scale_refine_topk=0
# 细分半径（例如 0.05 表示围绕候选尺度 ±0.05）
# Refinement radius (e.g., 0.05 indicates ±0.05 around the candidate scale)
track_scale_refine_radius=0.04
# 细分步长（例如 0.01）
# Refinement step size (e.g., 0.01)
track_scale_refine_step=0.02
# 轨道模板旋转角度搜索（单位：度，解决 UI 轻微倾斜/透视导致的失配）
# Track template rotation angle search (Unit: degrees; resolves mismatch from UI tilt/perspective)
# 关闭：将 track_angle_step 设为 0
# Disabled: Set track_angle_step to 0
track_angle_min=-2.0
track_angle_max=2.0
track_angle_step=0
# 在粗角度 topK 个结果附近再细分一次（建议 topK=2）
# Refine angle once near the top-K coarse angle results (recommended topK=2)
track_angle_refine_topk=0
# 细分半径（例如 0.2 表示围绕候选角度 ±0.2 度）
# Refinement radius (e.g., 0.2 indicates ±0.2 degrees around the candidate angle)
track_angle_refine_radius=0.2
# 细分步长（例如 0.05）
# Refinement step size (e.g., 0.05)
track_angle_refine_step=0.05
# 锁定轨道ROI时上下扩展像素（像素）
# Vertical padding when locking track ROI (pixels)
track_pad_y=30
# 轨道锁定丢失帧数 = game_end_confirm_frames * 此系数
# Track lock loss frames = game_end_confirm_frames * this coefficient
track_lock_miss_multiplier=6
# 轨道锁定丢失帧数下限（帧）
# Minimum floor for track lock loss frames (frames)
track_lock_miss_min_frames=60
# 连续MISS达到该帧数时强制松开鼠标（帧）
# Force mouse release if consecutive MISSes reach this frame count (frames)
miss_release_frames=3
# 小游戏结束判定帧数下限（帧）
# Minimum floor for minigame end determination (frames)
minigame_end_min_frames=10
# 仅模板滑块时允许的中心跳变阈值（像素）
# Allowed center jump threshold for template-only sliders (pixels)
slider_tpl_jump_threshold=150
# 鱼位置单帧跳变保护阈值（像素）
# Single-frame fish position jump protection threshold (pixels)
fish_jump_threshold=80
# 记录滑块高度为“可信高度”的最小值（像素）
# Minimum value to record slider height as "stable height" (pixels)
slider_height_stable_min=20
# 滑块速度上限（绝对值，像素/基准步）
# Slider velocity cap (Absolute value, pixels/base step)
slider_velocity_cap=30
# 鱼速度上限（绝对值，像素/基准步）
# Fish velocity cap (Absolute value, pixels/base step)
fish_velocity_cap=15
# 速度归一化的基准帧时长（毫秒）
# Reference frame duration for velocity normalization (ms)
base_dt_ms=50

# ── 鱼预测增强（方向A） ──
# ── Fish Prediction Enhancement (Direction A) ──
# MPC中鱼碰轨道边界是否反弹（1=开启，0=关闭）
# Whether fish bounce off track boundaries in MPC (1=On, 0=Off)
fish_bounce_predict=1
# 鱼加速度EMA平滑系数（0~1，越大跟踪越快）
# Fish acceleration EMA smoothing coefficient (0-1; higher tracks faster)
fish_accel_alpha=0.9
# MPC中鱼速度逐步衰减系数（0~1，1=不衰减，越小远期预测越保守）
# Fish velocity decay coefficient in MPC (0-1; 1=no decay; lower values are more conservative for long-term prediction)
fish_vel_decay=0.2
# 鱼加速度上限（px/基准帧^2，防止噪声导致极端值）
# Fish acceleration cap (px/base frame^2; prevents noise from causing extreme values)
fish_accel_cap=10.0

# ── 偏差快速响应（方向D） ──
# ── Rapid Deviation Response (Direction D) ──
# 启用偏差快速响应（1=开启，0=关闭）
# Enable rapid deviation response (1=On, 0=Off)
reactive_override=1
# 偏差触发阈值（相对滑块高度的比例，偏差 > sH * ratio 时才可能触发）
# Deviation trigger threshold (Ratio relative to slider height; triggers when deviation > sH * ratio)
reactive_dev_ratio=0.55
# 偏差增长速度阈值（px/基准帧，偏差增速超过此值时触发覆盖）
# Deviation growth speed threshold (px/base frame; triggers override when growth exceeds this value)
reactive_grow_threshold=3.0

# VRChat模板资源目录
# VRChat template resource directory
resource_dir=Resource-VRChat
# 咬钩感叹号（下半）模板文件名
# Bite exclamation (bottom half) template filename
tpl_bite_exclamation_bottom=bite_exclamation_bottom.png
# 咬钩感叹号（完整）模板文件名
# Bite exclamation (full) template filename
tpl_bite_exclamation_full=bite_exclamation_full.png
# 小游戏完整轨道模板文件名
# Minigame full track template filename
tpl_minigame_bar_full=minigame_bar_full.png
# 主鱼图标模板文件名
# Primary fish icon template filename
tpl_fish_icon=fish_icon.png
# 备用鱼图标模板1文件名（可选；也会自动加载 resource_dir 下 fish_icon_alt*.png）
# Alternate fish icon template 1 filename (Optional; automatically loads fish_icon_alt*.png in resource_dir)
tpl_fish_icon_alt=fish_icon_alt.png
# 备用鱼图标模板2文件名（可选；同上）
# Alternate fish icon template 2 filename (Optional; as above)
tpl_fish_icon_alt2=fish_icon_alt2.png
# 玩家滑块模板文件名
# Player slider template filename
tpl_player_slider=player_slider.png

# ML模式（0=自动控制，1=录制数据，2=ML推理）
# ML Mode (0=Auto control, 1=Record data, 2=ML inference)
ml_mode=0
# 录制模式输出CSV路径
# CSV output path for recording mode
ml_record_csv=data/record_data.csv
# 推理模式读取的权重文件路径
# Path to weights file for inference mode
ml_weights_file=data/ml_weights.txt

# 是否输出调试日志到控制台（1=开启，0=关闭）
# Output debug logs to console (1=On, 0=Off)
debug=1
# 是否保存调试截图（1=开启，0=关闭）
# Save debug screenshots (1=On, 0=Off)
debug_pic=0
# 调试截图输出目录
# Debug screenshot output directory
debug_dir=debug_vrchat
# VRChat日志文件路径（空字符串=不写文件，默认追加写入）
# VRChat log file path (Empty string = no file output; defaults to append)
vr_log_file=data/logs/log.csv